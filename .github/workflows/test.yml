name: Test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --locked

  ai-sdk-starter-build:
    name: AI SDK Starter Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/ai-sdk-starter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/ai-sdk-starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build starter
        run: npm run build

  copilotkit-starter-build:
    name: CopilotKit Starter Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/copilotkit-starter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/copilotkit-starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build starter
        run: npm run build
