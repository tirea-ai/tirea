[workspace]
resolver = "2"
members = [
    "crates/awaken-contract",
    "crates/awaken-runtime",
    "crates/awaken",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
awaken-contract = { version = "0.1.0", path = "crates/awaken-contract" }
awaken-runtime = { version = "0.1.0", path = "crates/awaken-runtime" }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
thiserror = "2"
async-trait = "0.1"
futures = "0.3"
tracing = "0.1"
typedmap = { version = "0.6", features = ["clone"] }
uuid = { version = "1", features = ["v7"] }
genai = "0.6.0-beta.10"
tokio = { version = "1", features = ["sync"] }
schemars = "0.8"
jsonschema = "0.45"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
