[package]
name = "tirea-extension-mode"
version.workspace = true
edition = "2021"
description = "Agent mode switching extension: named configuration profiles with runtime overlay for tirea agents"
license = "MIT OR Apache-2.0"
repository.workspace = true
keywords = ["agent", "llm", "mode", "configuration"]
categories = ["asynchronous"]

[dependencies]
tirea-state = { workspace = true, features = ["derive"] }
tirea-contract.workspace = true
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tirea-contract = { workspace = true, features = ["test-support"] }
tokio = { version = "1", features = ["rt", "macros"] }
