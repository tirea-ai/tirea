[package]
name = "tirea-extension-permission"
version.workspace = true
edition = "2021"
description = "Tool-level permission policies and user-approval gating for tirea agents"
license = "MIT OR Apache-2.0"
repository.workspace = true
keywords = ["agent", "llm", "permission", "policy"]
categories = ["asynchronous"]

[dependencies]
tirea-state = { workspace = true, features = ["derive"] }
tirea-contract.workspace = true
async-trait = "0.1"
glob-match = "0.2"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tirea-contract = { workspace = true, features = ["test-support"] }
tokio = { version = "1", features = ["rt", "macros"] }
