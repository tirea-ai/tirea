[package]
name = "tirea-extension-skills"
version.workspace = true
edition = "2021"
description = "Skill discovery, activation, and resource loading for tirea agent tool extensibility"
license = "MIT OR Apache-2.0"
repository.workspace = true
keywords = ["agent", "llm", "skills", "tools"]
categories = ["asynchronous"]

[dependencies]
tirea-contract.workspace = true
tirea-state = { workspace = true, features = ["derive"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
unicode-normalization = "0.1"
tracing = "0.1"
base64 = "0.22"
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "time", "process"] }

[dev-dependencies]
tirea-contract = { workspace = true, features = ["test-support"] }
tokio = { version = "1", features = ["rt", "macros"] }
tempfile = "3"
