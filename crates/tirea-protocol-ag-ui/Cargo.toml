[package]
name = "tirea-protocol-ag-ui"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
repository.workspace = true
description = "AG-UI protocol event encoding and history adapters for tirea"
keywords = ["agent", "llm", "ag-ui", "protocol"]
categories = ["asynchronous", "encoding"]

[dependencies]
tirea-contract.workspace = true
tirea-state.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
json-patch = "3"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v7"] }

[dev-dependencies]
tirea-contract = { workspace = true, features = ["test-support"] }
tirea-agentos.workspace = true
tirea-extension-permission.workspace = true
tirea-extension-observability.workspace = true
tirea-extension-skills.workspace = true
async-trait = "0.1"
tirea-state = { workspace = true, features = ["derive"] }
tirea-store-adapters.workspace = true
futures = "0.3"
genai.workspace = true
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs"] }
tracing-subscriber = { version = "0.3", features = ["fmt", "registry"] }

[lints]
workspace = true
