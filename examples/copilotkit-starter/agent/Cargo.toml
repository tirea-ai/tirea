[package]
name = "copilotkit-starter-agent"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
tirea-examples = { version = "0.2.0", path = "../../../examples" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
clap = { version = "4", features = ["derive", "env"] }

[[bin]]
name = "copilotkit-starter-agent"
path = "src/main.rs"
